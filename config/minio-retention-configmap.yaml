apiVersion: v1
kind: ConfigMap
metadata:
  name: minio-lifecycle-scripts
data:
  setup.sh: |
    #!/bin/sh
    mc alias set minio http://minio:9000 $MINIO_ROOT_USER $MINIO_ROOT_PASSWORD
    buckets = [mimir-blocks, mimir-alertmanager, mimir-ruler, loki-chunks, loki-ruler, tempo]

    for bucket in buckets; do
      until mc ls minio/$bucket > /dev/null 2>&1; do
        echo "Waiting for bucket $bucket..."
        sleep 3
      done
    done

    mc ilm rule add --expire-days $MIMIR_RETENTION_DAYS minio/mimir-alertmanager
    mc ilm rule add --expire-days $MIMIR_RETENTION_DAYS minio/mimir-ruler
    mc ilm rule add --expire-days $LOKI_RETENTION_DAYS minio/loki-chunks
    mc ilm rule add --expire-days $LOKI_RETENTION_DAYS minio/loki-ruler
    mc ilm rule add --expire-days $MIMIR_RETENTION_DAYS minio/mimir-blocks
    mc ilm rule add --expire-days $TEMPO_RETENTION_DAYS minio/tempo

    echo "Done. Current rules:"
    for bucket in buckets; do
      echo "--- $bucket ---"
      mc ilm rule ls minio/$bucket
    done
