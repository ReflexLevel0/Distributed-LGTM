apiVersion: batch/v1
kind: Job
metadata:
  name: minio-lifecycle-setup
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-minio
          image: busybox
          command:
            - sh
            - -c
            - |
              until nc -z minio 9000; do
                echo "Waiting for MinIO to be ready..."
                sleep 5
              done
              echo "MinIO is up"
      containers:
        - name: mc
          image: minio/mc:latest
          command:
            - sh
            - /scripts/setup.sh
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio
                  key: rootUser
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio
                  key: rootPassword
            - name: MIMIR_RETENTION_DAYS
              value: '90'
            - name: LOKI_RETENTION_DAYS
              value: '30'
            - name: TEMPO_RETENTION_DAYS
              value: '30'
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: minio-lifecycle-scripts
            defaultMode: 0755
